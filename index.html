<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TiNo Shop</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#f5f5f5;
}

header{
    background:#000;
    color:white;
    padding:20px;
    text-align:center;
}

.hero{
    height:400px;
    background:linear-gradient(135deg,#ff0050,#00f2ea);
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    color:white;
    text-align:center;
}

.hero h1{
    font-size:50px;
}

.hero p{
    margin-top:10px;
    font-size:18px;
}

.btn{
    margin-top:20px;
    padding:12px 30px;
    border:none;
    background:white;
    color:black;
    border-radius:30px;
    cursor:pointer;
    font-weight:bold;
}

.products{
    padding:50px 20px;
    text-align:center;
}

.product-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
    margin-top:30px;
}

.card{
    background:white;
    border-radius:15px;
    padding:20px;
    box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

.card img{
    width:100%;
    border-radius:10px;
}

footer{
    background:#111;
    color:white;
    text-align:center;
    padding:20px;
}
</style>
</head>

<body>

<header>
    <h2>TiNo Shop</h2>
</header>

<section class="hero">
    <h1>Chào mừng đến với TiNo</h1>
    <p>Thời trang trẻ trung - Giá tốt - Chất lượng</p>
    <button class="btn">Mua Ngay</button>
</section>

<section class="products">
    <h2>Sản Phẩm Nổi Bật</h2>

    <div class="product-grid">
        <div class="card">
            <img src="https://via.placeholder.com/300" alt="">
            <h3>Áo Streetwear</h3>
            <p>299.000 VNĐ</p>
        </div>

        <div class="card">
            <img src="https://via.placeholder.com/300" alt="">
            <h3>Quần Short</h3>
            <p>199.000 VNĐ</p>
        </div>

        <div class="card">
            <img src="https://via.placeholder.com/300" alt="">
            <h3>Áo Oversize</h3>
            <p>349.000 VNĐ</p>
        </div>
    </div>
</section>

<footer>
    © 2026 TiNo Shop | TikTok Shop
</footer>

</body>
</html>
